<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #03010a; }
    canvas { display: block; }
    #hints {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 18px;
      font: 11px/1.4 'SF Pro Display', system-ui, sans-serif;
      color: rgba(200,220,255,0.45);
      pointer-events: none;
      letter-spacing: 0.04em;
      animation: fadein 2s ease 1s both;
    }
    #hints span::before { content: attr(data-key); margin-right: 5px; opacity: 0.6; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="hints">
    <span data-key="单击">爆炸</span>
    <span data-key="双击">超空间</span>
    <span data-key="右键">引力井</span>
    <span data-key="空格">流星雨</span>
    <span data-key="T">主题</span>
    <span data-key="M">音乐</span>
    <span data-key="P">暂停</span>
    <span data-key="S">截图</span>
    <span data-key="移动">光粒子</span>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
