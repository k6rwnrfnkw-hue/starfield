<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield</title>
  <link rel="icon" href="data:,">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <script src="renderer.js"></script>
  <script src="particle-system.js"></script>
  <script src="interaction.js"></script>
  <script>
    const canvas = document.getElementById('starfield');
    const renderer = Renderer.init(canvas);
    const stars = ParticleSystem.create(canvas);
    const interaction = Interaction.init(stars, canvas);

    function frame() {
      renderer.clear();
      ParticleSystem.update(stars);
      interaction.update(renderer.ctx);
      renderer.drawStars(stars);
      requestAnimationFrame(frame);
    }

    frame();
  </script>
</body>
</html>
